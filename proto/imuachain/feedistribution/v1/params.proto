syntax = "proto3";
package imuachain.feedistribution.v1;

import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/imua-xyz/imuachain/x/feedistribution/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "imua/x/feedistribution/params";
  // community_tax is the tax defined for allocation
  // Currently, use the same community tax for the rewards distribution of all AVSs
  string community_tax = 1 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (amino.dont_omitempty) = true,
    (gogoproto.nullable) = false
  ];
}
