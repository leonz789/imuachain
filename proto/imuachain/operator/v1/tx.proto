syntax = "proto3";
package imuachain.operator.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos/staking/v1beta1/staking.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "imuachain/operator/v1/params.proto";

option go_package = "github.com/imua-xyz/imuachain/x/operator/types";

// DecValueField is a field that holds a value of sdk.LegacyDec type.
message DecValueField {
  // remove the default stringer for DecValueField and instead implement
  // amount.String() to get the string value.
  option (gogoproto.goproto_stringer) = false;
  // amount is the USD value of the asset, as an sdk.LegacyDec.
  string amount = 1 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false
  ];
}

// OperatorOptedUSDValue records the self and total opted-in USD value for the specified operator and AVS
message OperatorOptedUSDValue {
  // self_usd_value is the USD value owned by the operator itself.
  string self_usd_value = 1 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false,
    (gogoproto.customname) = "SelfUSDValue"
  ];
  // total_usd_value is the total opted-in USD value for the specified operator and AVS
  string total_usd_value = 2 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false,
    (gogoproto.customname) = "TotalUSDValue"
  ];
  // active_usd_value is the active opted-in USD value for the specified operator and AVS
  // this field will be zero if the operator's self staking isn't sufficient. Of course, it will
  // be equal to total_usd_value if the operator's self staking meets the AVS requirement.
  string active_usd_value = 3 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false,
    (gogoproto.customname) = "ActiveUSDValue"
  ];
}

// OperatorVotingPower represents the voting power for the specified operator address
message OperatorVotingPower {
  // operator_addr is the operator address, its type should be a sdk.AccAddress
  string operator_addr = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // voting_power is the active voting power for the above operator address
  string voting_power = 2 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false
  ];
}

// VotingPowerSnapshot records historical voting power for AVSs at specific epochs
// or after slashing events.These snapshots are created at the end of each epoch and
// when slashing occurs, enabling historical queries of operator voting power at
// specific points in time.
message VotingPowerSnapshot {
  // total_voting_power is the total voting power of specified AVS
  string total_voting_power = 1 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false
  ];
  // operator_voting_powers records the active voting power of all operators
  // for the specified AVS
  repeated OperatorVotingPower operator_voting_powers = 2;
  // last_changed_height is used to indicate the height of most recent change when
  // the operator_voting_powers is nil, which can help to fall back to the correct epoch height.
  int64 last_changed_height = 3;
  // epoch_identifier record the epoch info
  string epoch_identifier = 4;
  // epoch_number indicates which epoch this snapshot serve for
  int64 epoch_number = 5;
}

// SnapshotHelper is used to record the helper information for voting power snapshot update
message SnapshotHelper {
  // last_changed_height indicates the height of the most recent change.
  // It is used to set the `last_changed_height` field in `VotingPowerSnapshot`.
  int64 last_changed_height = 1;
}

// ClientChainEarningAddrList is the list of client chain earning addresses.
// Because the reward token provide by the AVS might be located at different client chain, the operator need to
// provide the different client chain address to receive the token rewards.
message ClientChainEarningAddrList {
  // earning_info_list is the contents of ClientChainEarningAddrList.
  repeated ClientChainEarningAddrInfo earning_info_list = 1;
}

// ClientChainEarningAddrInfo is the client chain earning address info.
message ClientChainEarningAddrInfo {
  // lz_client_chain_id is the layer0 client chain id.
  uint64 lz_client_chain_id = 1 [(gogoproto.customname) = "LzClientChainID"];
  // client_chain_earning_addr is the client chain earning address.
  string client_chain_earning_addr = 2;
}

// OperatorInfo is the operator info.
message OperatorInfo {
  // operator_addr is the operator address, its type should be a sdk.AccAddress
  string operator_addr = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // description defines the description terms for the operator.
  cosmos.staking.v1beta1.Description description = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  // client_chain_earning_addr_list is the client chain earning address list.
  ClientChainEarningAddrList client_chain_earnings_addr = 3;
  // commission defines the commission parameters. it includes the time at which the commission
  // was last updated.
  cosmos.staking.v1beta1.Commission commission = 4 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  // disable_compound_rewards indicates whether compounding for unclaimed rewards is disabled.
  // By default, rewards are automatically compounded. This flag provides flexibility to disable it.
  bool disable_compound_rewards = 5;
}

// OptedInfo is the opted information about operator
message OptedInfo {
  // slash_contract is the slash contract address of AVS opted-in by the operator
  string slash_contract = 1;
  // opted_in_height is the imua block height at which the operator opted in
  uint64 opted_in_height = 2;
  // opted_out_height is the imua block height at which the operator opted out
  uint64 opted_out_height = 3;
  // jailed defined whether the operator has been jailed from bonded status or not.
  bool jailed = 4;
  // jail_toggle_heights stores all block heights at which the operator's jail status changed.
  // It always starts with a jail event. Even indices (0, 2, ...) represent jail events,
  // and odd indices (1, 3, ...) represent unjail events.
  // This can be used to accurately calculate reward eligibility by excluding jailed periods.
  repeated uint64 jail_toggle_heights = 5;
}

// OptedInAssetState is the state of opted-in asset
message OptedInAssetState {
  // amount of the opted-in asset
  string amount = 1 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int",
    (gogoproto.nullable) = false
  ];
  // value is the USD value of the opted-in asset
  string value = 2 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false
  ];
}

// SlashType represents different slash type
enum SlashType {
  // SLASH_TYPE__UNSPECIFIED represents the unspecified slash type
  SLASH_TYPE_UNSPECIFIED = 0;
  // SLASH_TYPE_INSTANT_SLASH represents the slash events that will be handled instantly after occurring
  // so the slash will reduce the amount of related operator's assets pool.
  SLASH_TYPE_INSTANT_SLASH = 1;
  // NoInstantaneousSlash indicates that the slash event will be processed after a certain
  // period of time, thus requiring a reduction in the share of the corresponding staker.
  SLASH_TYPE_NO_INSTANTANEOUS_SLASH = 2;
}

// SlashFromUndelegation records the slash detail from the undelegation
message SlashFromUndelegation {
  // staker_id is the staker id.
  string staker_id = 1 [(gogoproto.customname) = "StakerID"];
  // asset_id is the asset id.
  string asset_id = 2 [(gogoproto.customname) = "AssetID"];
  // amount is the slashed amount from the undelegation.
  string amount = 3 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int",
    (gogoproto.nullable) = false
  ];
  // undelegation_id is a globally incrementing number used to identify an undelegation.
  // It will be included in the key when storing the undelegation.
  uint64 undelegation_id = 4;
  // reward_asset indicates whether the undelegation is for rewards
  bool reward_asset = 5;
}

// SlashAssetAmount records the slash amount of specific assetID
message SlashAssetAmount {
  // asset_id is the asset id.
  string asset_id = 1 [(gogoproto.customname) = "AssetID"];
  // amount is the slashed amount.
  string amount = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int",
    (gogoproto.nullable) = false
  ];
}
// SlashFromUnclaimedRewards records the slash detail from the operator unclaimed rewards
message SlashFromUnclaimedRewards {
  // avs is the AVS from which the rewards were earned.
  string avs = 1 ;
  // slash_assets represent multiple rewards assets states that are slashed.
  repeated SlashAssetAmount slash_assets = 2 [(gogoproto.nullable) = false];
}

// SlashExecutionInfo is the actual execution state for a slash event
message SlashExecutionInfo {
  // slash_proportion is the new calculated proportion when execute the slash
  string slash_proportion = 1 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false
  ];
  // slash_value is the usd value of all slashed assets
  string slash_value = 2 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false
  ];
  // slash_undelegations records all slash info related to the undelegation
  repeated SlashFromUndelegation slash_undelegations = 3 [(gogoproto.nullable) = false];
  // slash_assets_pool records all slash info related to the assets pool
  repeated SlashAssetAmount slash_assets_pool = 4 [(gogoproto.nullable) = false];
  // undelegation_filter_height records the height before which undelegations are not slashed
  int64 undelegation_filter_height = 5;
  // the historical voting power at the time of the slash event.
  int64 historical_voting_power = 6;
  // slash_unclaimed_rewards records all slash amounts from unclaimed rewards
  repeated SlashFromUnclaimedRewards slash_unclaimed_rewards = 7 [(gogoproto.nullable) = false];
}

// OperatorSlashInfo is the slash info of operator
message OperatorSlashInfo {
  // slash_contract is the address of slash contract
  string slash_contract = 1;
  // submitted_height is the imua block height at which the slash event is submitted
  int64 submitted_height = 2;
  // event_height is the imua block height at which the slash event occurs
  int64 event_height = 3;
  // is_vetoed is a flag to indicate if this slash is vetoed
  bool is_vetoed = 4;
  // slash_proportion is the proportion of assets that need to be slashed
  string slash_proportion = 5 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false
  ];
  // slash_type indicates the slash type of specified AVS.
  uint32 slash_type = 6;
  // SlashExecutionInfo stores the slashed execution information
  SlashExecutionInfo execution_info = 7;
}

// RegisterOperatorReq is the request to register a new operator.
message RegisterOperatorReq {
  option (cosmos.msg.v1.signer) = "from_address";
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  // from_address is the address of the operator (sdk.AccAddress).
  string from_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // info is the operator info.
  OperatorInfo info = 2;
}

// RegisterOperatorResponse is the response to a register operator request.
message RegisterOperatorResponse {}

// OptIntoAVSReq is the request to opt into an AVS.
message OptIntoAVSReq {
  option (cosmos.msg.v1.signer) = "from_address";
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  // from_address is the address of the operator (sdk.AccAddress).
  string from_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // avs_address is the address of the AVS.
  string avs_address = 2;
  // public_key_json is an optional parameter to provide the consensus key.
  // the key is provided in the JSON format and not the hex format.
  // TODO: allow providing a BLS key here, depending on the AVS.
  string public_key_json = 3 [(gogoproto.customname) = "PublicKeyJSON"];
}

// OptIntoAVSResponse is the response to a opt into an AVS request.
message OptIntoAVSResponse {}

// OptOutOfAVSReq is the request to opt out from an AVS.
message OptOutOfAVSReq {
  option (cosmos.msg.v1.signer) = "from_address";
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  // from_address is the address of the operator (sdk.AccAddress).
  string from_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // avs_address is the address of the AVS.
  string avs_address = 2;
}

// OptOutOfAVSResponse is the response to a opt out of an AVS request.
message OptOutOfAVSResponse {}

// SetConsKeyReq is the request to set the operator's consensus key for an AVS.
message SetConsKeyReq {
  option (cosmos.msg.v1.signer) = "address";
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;
  // address is the operator address
  string address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // avs_address is the address of the AVS.
  string avs_address = 2;
  // public_key_json is the consensus public key of the operator in the JSON format, for example:
  // `{"@type":"/cosmos.crypto.ed25519.PubKey","key":"Ui5Gf1+mtWUdH8u3xlmzdKID+F3PK0sfXZ73GZ6q6is="}`
  // there is no need to check for knowledge of the corresponding private key since this is ED25519
  // and not BLS key, where a rogue key attack can take place. however, we should still check for
  // overlap with another operator's key.
  string public_key_json = 3 [(gogoproto.customname) = "PublicKeyJSON"];
}

// SetConsKeyResponse is the response to SetConsKeyReq.
message SetConsKeyResponse {}

// UpdateCommissionReq is the request to update the operator's commission.
message UpdateCommissionRateReq {
  option (cosmos.msg.v1.signer) = "address";
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;
  // address is the operator address
  string address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // commission_rate is the new commission rate.
  string commission_rate = 2 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false
  ];
}

// EditOperatorReq is the request to edit an operator.
message EditOperatorReq {
  option (cosmos.msg.v1.signer) = "address";
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  // address is the operator address
  string address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // description defines the description terms for the operator.
  cosmos.staking.v1beta1.Description description = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// EditOperatorResponse is the response to a edit operator request.
message EditOperatorResponse {}

// UpdateRewardCompoundingFlagReq is the request to update the reward compounding flag for an operator
message UpdateRewardCompoundingFlagReq {
  option (cosmos.msg.v1.signer) = "address";
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  // address is the operator address
  string address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // disable_compound_rewards is a flag to indicate whether to disable the reward compounding
  bool disable_compound_rewards = 2;
}

// UpdateRewardCompoundingFlagResponse is the response to update the reward compounding flag
message UpdateRewardCompoundingFlagResponse {}

// MsgUpdateParams is the Msg/UpdateParams request type for the parameters of
// this module..
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "address";
  option (gogoproto.equal) = false;
  option (gogoproto.goproto_getters) = false;

  // authority is the address of the account, which must sign this request.
  // typically, it is the address of the governance module.
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  // NOTE: All parameters must be supplied.
  Params params = 2 [(gogoproto.nullable) = false];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// UpdateCommissionRateResponse is the response to a update commission rate request.
message UpdateCommissionRateResponse {}

// Msg defines the operator Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // RegisterOperator registers a new operator.
  rpc RegisterOperator(RegisterOperatorReq) returns (RegisterOperatorResponse) {
    option (google.api.http).post = "/imuachain/operator/v1/tx/register_operator";
  }

  // SetConsKey sets the operator's consensus key for an AVS. To do this, the operator
  // must have previously opted into the AVS.
  rpc SetConsKey(SetConsKeyReq) returns (SetConsKeyResponse) {
    option (google.api.http).post = "/imuachain/operator/v1/tx/set_cons_key";
  }

  // OptIntoAVS opts an operator into an AVS.
  rpc OptIntoAVS(OptIntoAVSReq) returns (OptIntoAVSResponse) {
    option (google.api.http).post = "/imuachain/operator/v1/tx/opt_into_avs";
  }
  // OptOutOfAVS opts an operator out of an AVS.
  rpc OptOutOfAVS(OptOutOfAVSReq) returns (OptOutOfAVSResponse) {
    option (google.api.http).post = "/imuachain/operator/v1/tx/opt_out_of_avs";
  }

  // UpdateCommissionRate updates the operator's commission rate.
  rpc UpdateCommissionRate(UpdateCommissionRateReq) returns (UpdateCommissionRateResponse) {
    option (google.api.http).post = "/imuachain/operator/v1/tx/update_commission_rate";
  }

  // EditOperator edits an operator.
  rpc EditOperator(EditOperatorReq) returns (EditOperatorResponse) {
    option (google.api.http).post = "/imuachain/operator/v1/tx/edit_operator";
  }

  // UpdateRewardCompoundingFlag updates the reward compounding flag of an operator
  rpc UpdateRewardCompoundingFlag(UpdateRewardCompoundingFlagReq) returns (UpdateRewardCompoundingFlagResponse) {
    option (google.api.http).post = "/imuachain/operator/v1/tx/update_reward_compounding_flag";
  }

  // UpdateParams updates the parameters of the module.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse) {
    option (google.api.http).post = "/imuachain/operator/v1/tx/update_params";
  }
}
