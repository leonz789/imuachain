syntax = "proto3";
package imuachain.immint.v1;

import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "imuachain/immint/v1/params.proto";

option go_package = "github.com/imua-xyz/imuachain/x/immint/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/imuachain/immint/v1/params";
  }
  // EpochMintInfo queries the mint info for the current epoch.
  rpc EpochMintInfo(QueryEpochMintInfoRequest) returns (QueryEpochMintInfoResponse) {
    option (google.api.http).get = "/imuachain/immint/v1/epoch_mint_info";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [(gogoproto.nullable) = false];
}

// EpochMintInfo includes the mint amount and annual reward inflation for the current epoch.
message EpochMintInfo {
  // epoch_mint_amount is the reward amount minted for current epoch.
  string epoch_mint_amount = 1 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int",
    (gogoproto.nullable) = false
  ];
  // annual_inflation is the annual reward inflation used for the current epoch.
  // It will be calculated when inflation parameters are disabled, because it hasn't been
  // configured in this case.
  string annual_inflation = 2 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false
  ];
}

// QueryEpochMintInfoRequest is request type for the Query/EpochMintInfo RPC method.
message QueryEpochMintInfoRequest {}

// QueryParamsResponse is response type for the Query/EpochMintInfo RPC method.
message QueryEpochMintInfoResponse {
  // epoch_mint_info holds the mint info for the current epoch.
  EpochMintInfo epoch_mint_info = 1 [(gogoproto.nullable) = false];
}
